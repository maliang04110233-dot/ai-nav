  <style>
    /* ===== CSS Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --bg-card: #12121a;
      --bg-card-hover: #1a1a28;
      --bg-nav: #0d0d18;
      --border: #1e1e2e;
      --border-hover: #2e2e4a;
      --text-primary: #e8e8f0;
      --text-secondary: #8888a8;
      --text-muted: #555568;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.25);
      --accent-2: #00d4aa;
      --tag-bg: rgba(108, 99, 255, 0.1);
      --tag-text: #a8a4ff;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --transition: all 0.25s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; outline: none; font-family: inherit; }

    /* ===== Layout ===== */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ===== Header ===== */
    .header {
      padding: 48px 0 32px;
      text-align: center;
      position: relative;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse at center, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .header-inner { position: relative; z-index: 1; }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px var(--accent-glow);
    }

    .logo-icon svg { width: 28px; height: 28px; color: #fff; }

    .logo h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      color: var(--text-secondary);
      font-size: 16px;
      font-weight: 400;
      margin-bottom: 32px;
    }

    /* ===== Search ===== */
    .search-wrap {
      max-width: 560px;
      margin: 0 auto 40px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 18px; top: 50%;
      transform: translateY(-50%);
      width: 20px; height: 20px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 14px 20px 14px 52px;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      color: var(--text-primary);
      font-size: 15px;
      transition: var(--transition);
      backdrop-filter: blur(10px);
    }

    .search-input::placeholder { color: var(--text-muted); }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
      outline: none;
    }

    /* ===== Category Nav ===== */
    .cat-nav {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
      padding: 6px;
      background: var(--bg-nav);
      border-radius: 50px;
      border: 1px solid var(--border);
      max-width: 780px;
      margin-left: auto;
      margin-right: auto;
    }

    .cat-btn {
      padding: 9px 20px;
      border-radius: 50px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .cat-btn svg { width: 15px; height: 15px; }

    .cat-btn:hover {
      color: var(--text-primary);
      background: var(--bg-card);
    }

    .cat-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* ===== Stats Bar ===== */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .stat { text-align: center; }

    .stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* ===== Cards Grid ===== */
    .cards-section { margin-bottom: 64px; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .cards-grid.hidden { display: none; }

    /* ===== Card ===== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .card:hover::before { opacity: 1; }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .card-icon svg { width: 22px; height: 22px; }

    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .card-tag {
      padding: 3px 10px;
      border-radius: 50px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 11px;
      font-weight: 500;
    }

    .card-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .card-desc {
      font-size: 13.5px;
      color: var(--text-secondary);
      line-height: 1.6;
      flex-grow: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .card-pricing {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-pricing svg { width: 13px; height: 13px; }

    .card-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: rgba(108, 99, 255, 0.12);
      color: var(--accent);
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      transition: var(--transition);
    }

    .card-link svg { width: 14px; height: 14px; }

    .card-link:hover {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 16px var(--accent-glow);
    }

    /* ===== Empty State ===== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      display: none;
    }

    .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 16px; }

    .empty-state.visible { display: block; }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      padding: 32px 0 48px;
      color: var(--text-muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }

    .footer a { color: var(--accent); }

    /* ===== Scroll to top ===== */
    .scroll-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 44px;
      height: 44px;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .scroll-top svg { width: 20px; height: 20px; }
    .scroll-top.visible { opacity: 1; pointer-events: auto; }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .header { padding: 32px 0 24px; }
      .logo h1 { font-size: 24px; }
      .tagline { font-size: 14px; }

      .cat-nav {
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
        border-radius: var(--radius-sm);
        padding: 8px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .cat-nav::-webkit-scrollbar { display: none; }
      .cat-btn { padding: 7px 14px; font-size: 13px; }

      .cards-grid { grid-template-columns: 1fr; }
      .stats-bar { gap: 24px; }

      .scroll-top { bottom: 20px; right: 20px; }
    }

    @media (max-width: 480px) {
      .container { padding: 0 16px; }
      .card { padding: 18px; }
      .card-link { padding: 6px 12px; font-size: 12px; }
    }

    /* ===== Animations ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card { animation: fadeUp 0.4s ease forwards; opacity: 0; }
    .cards-grid:not(.hidden) .card { }

    /* stagger via JS */
  </style>
</head>

    // ===== State =====
    let activeCat = 'all';
    let searchQuery = '';

    // ===== DOM Refs =====
    const $cardsContainer = document.getElementById('cardsContainer');
    const $emptyState = document.getElementById('emptyState');
    const $catNav = document.getElementById('catNav');
    const $searchInput = document.getElementById('searchInput');
    const $scrollTop = document.getElementById('scrollTop');

    // ===== Render Functions =====
    function buildCard(tool, index) {
      const tagHtml = tool.tags.map(t => `<span class="card-tag">${t}</span>`).join('');

      const card = document.createElement('a');
      card.className = 'card';
      card.href = tool.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.style.animationDelay = `${index * 40}ms`;
      card.innerHTML = `
        <div class="card-top">
          <div class="card-icon" style="background:${tool.iconBg}20; color:${tool.iconBg}">
            <span>${tool.icon}</span>
          </div>
        </div>
        <div>
          <div class="card-name">${tool.name}</div>
          <div class="card-tags">${tagHtml}</div>
        </div>
        <div class="card-desc">${tool.desc}</div>
        <div class="card-footer">
          <div class="card-pricing">
            <i data-lucide="credit-card"></i>
            ${tool.pricing}
          </div>
          <div class="card-link">
            访问
            <i data-lucide="arrow-right"></i>
          </div>
        </div>
      `;
      return card;
    }

    function renderCards() {
      // Build sections for each category that has visible cards
      const catOrder = ['chat', 'code', 'image', 'video', 'content', 'search'];
      const catLabels = {
        chat: 'AI对话',
        code: '代码工具',
        image: '图片生成',
        video: '视频生成',
        content: '内容创作',
        search: '信息获取'
      };

      let totalVisible = 0;
      let allVisibleTools = [];

      if (activeCat === 'all' && !searchQuery) {
        // Show all in category sections
        $cardsContainer.innerHTML = '';
        catOrder.forEach(cat => {
          const catTools = tools.filter(t => t.category === cat);
          if (catTools.length === 0) return;

          const section = document.createElement('section');
          section.className = 'cards-section';

          const title = document.createElement('h2');
          title.style.cssText = 'font-size:20px;font-weight:700;margin-bottom:20px;color:var(--text-primary);display:flex;align-items:center;gap:8px;';
          title.textContent = catLabels[cat];

          const grid = document.createElement('div');
          grid.className = 'cards-grid';
          grid.id = `grid-${cat}`;

          catTools.forEach((tool, i) => {
            grid.appendChild(buildCard(tool, i));
            totalVisible++;
          });

          section.appendChild(title);
          section.appendChild(grid);
          $cardsContainer.appendChild(section);
        });
      } else {
        // Filtered view
        const filtered = tools.filter(t => {
          const matchCat = activeCat === 'all' || t.category === activeCat;
          const q = searchQuery.toLowerCase();
          const matchSearch = !q ||
            t.name.toLowerCase().includes(q) ||
            t.desc.toLowerCase().includes(q) ||
            t.tags.some(tag => tag.toLowerCase().includes(q));
          return matchCat && matchSearch;
        });

        allVisibleTools = filtered;

        if (filtered.length === 0) {
          $cardsContainer.innerHTML = '';
          $emptyState.classList.add('visible');
        } else {
          $emptyState.classList.remove('visible');
          $cardsContainer.innerHTML = '';
          const section = document.createElement('section');
          section.className = 'cards-section';

          const grid = document.createElement('div');
          grid.className = 'cards-grid';
          grid.id = 'grid-filtered';

          filtered.forEach((tool, i) => {
            grid.appendChild(buildCard(tool, i));
            totalVisible++;
          });

          section.appendChild(grid);
          $cardsContainer.appendChild(section);
        }
      }

      document.getElementById('statVisible').textContent = totalVisible;
      lucide.createIcons();
    }

    // ===== Event Handlers =====
    $catNav.addEventListener('click', e => {
      const btn = e.target.closest('.cat-btn');
      if (!btn) return;

      activeCat = btn.dataset.cat;
      $catNav.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCards();
    });

    let searchTimeout;
    $searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchQuery = $searchInput.value.trim();
        renderCards();
      }, 200);
    });

    // Scroll to top button
    window.addEventListener('scroll', () => {
      $scrollTop.classList.toggle('visible', window.scrollY > 400);
    });

    // ===== Init =====
    document.getElementById('statTools').textContent = tools.length;
    renderCards();
  </script>
